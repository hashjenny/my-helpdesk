version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: toor
      POSTGRES_DB: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:toor@db:5432/helpdesk
      PORT: 3001
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-this-secret-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:5173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@helpdesk.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-toor123}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-support@helpdesk.com}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter frontend build && npx serve dist -l 5173"
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data: